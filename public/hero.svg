<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Hello World hero visual">
  <defs>
    <pattern id="dots" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="7" fill="#ffffff"/>
    </pattern>

    <linearGradient id="bodyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2b2f"/>
      <stop offset="100%" stop-color="#17171a"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a3a3e"/>
      <stop offset="100%" stop-color="#29292d"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="codeBg" cx="0.5" cy="0.45" r="0.8">
      <stop offset="0%" stop-color="#1f1f24"/>
      <stop offset="100%" stop-color="#111114"/>
    </radialGradient>

    <linearGradient id="rightEdge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </linearGradient>

    <filter id="ambient" x="-10%" y="-10%" width="130%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="8" dy="34"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="roundClip">
      <rect x="0" y="0" width="1400" height="800" rx="16" ry="16"/>
    </clipPath>

    <clipPath id="codeAreaClip">
      <rect x="108" y="96" width="1292" height="684"/>
    </clipPath>
  </defs>

  <g id="editor" transform="matrix(0.88 -0.07 0.1 0.72 130 190)" filter="url(#ambient)">

    <g id="editor-depth">
      <rect x="22" y="28" width="1400" height="800" rx="16" ry="16" fill="#05050a"/>
      <rect x="14" y="18" width="1400" height="800" rx="16" ry="16" fill="#0a0a10"/>
    </g>

    <g id="editor-body">
      <rect x="0" y="0" width="1400" height="800" rx="16" ry="16" fill="url(#bodyGrad)"/>

      <g clip-path="url(#roundClip)">

        <g id="titlebar">
          <rect x="0" y="0" width="1400" height="56" fill="url(#titleGrad)"/>
          <rect x="0" y="0" width="1400" height="56" fill="url(#sheen)"/>
          <line x1="0" y1="56" x2="1400" y2="56" stroke="#090909" stroke-width="1"/>
          <circle cx="34" cy="28" r="8" fill="#ff5f57"/>
          <circle cx="62" cy="28" r="8" fill="#febc2e"/>
          <circle cx="90" cy="28" r="8" fill="#28c840"/>
          <text x="700" y="34" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" fill="#76767c" letter-spacing="0.4">hello.js — editor</text>
        </g>

        <g id="activity-bar">
          <rect x="0" y="56" width="56" height="724" fill="#222226"/>
          <line x1="56" y1="56" x2="56" y2="800" stroke="#090909" stroke-width="1"/>
          <g fill="none" stroke="#6a6a70" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="20" y="84" width="18" height="16" rx="1" stroke="#e8e8ec" stroke-width="2"/>
            <circle cx="28" cy="138" r="7"/>
            <line x1="33" y1="143" x2="39" y2="149"/>
            <circle cx="23" cy="184" r="3" fill="#6a6a70"/>
            <circle cx="35" cy="184" r="3" fill="#6a6a70"/>
            <circle cx="23" cy="204" r="3" fill="#6a6a70"/>
            <line x1="23" y1="184" x2="23" y2="204"/>
            <line x1="23" y1="190" x2="32" y2="184"/>
            <rect x="20" y="232" width="18" height="14" rx="1"/>
            <line x1="24" y1="238" x2="34" y2="238"/>
          </g>
        </g>

        <g id="tab-bar">
          <rect x="56" y="56" width="1344" height="40" fill="#1c1c20"/>
          <line x1="56" y1="96" x2="1400" y2="96" stroke="#090909" stroke-width="1"/>
          <rect x="56" y="56" width="188" height="40" fill="#17171a"/>
          <rect x="56" y="56" width="188" height="2" fill="#4ea1ff"/>
          <rect x="72" y="70" width="12" height="12" rx="1.5" fill="#f7df1e"/>
          <text x="92" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, sans-serif" font-size="13" fill="#dadade">hello.js</text>
          <text x="222" y="81" font-family="-apple-system, sans-serif" font-size="16" fill="#78787c">×</text>
          <line x1="244" y1="66" x2="244" y2="86" stroke="#090909" stroke-width="1"/>
        </g>

        <g id="code-area">
          <rect x="56" y="96" width="1344" height="684" fill="url(#codeBg)"/>
          <rect x="56" y="96" width="52" height="684" fill="#15151a"/>
          <line x1="108" y1="96" x2="108" y2="780" stroke="#090909" stroke-width="1"/>

          <g id="line-numbers" font-family="'SF Mono', Menlo, Consolas, 'Courier New', monospace" font-size="11" fill="#44444a" text-anchor="end">
            <text x="98" y="122">1</text>
            <text x="98" y="146">2</text>
            <text x="98" y="170">3</text>
            <text x="98" y="194">4</text>
            <text x="98" y="218">5</text>
            <text x="98" y="242">6</text>
            <text x="98" y="266">7</text>
            <text x="98" y="290">8</text>
            <text x="98" y="314">9</text>
            <text x="98" y="338">10</text>
            <text x="98" y="362">11</text>
            <text x="98" y="386">12</text>
            <text x="98" y="410">13</text>
            <text x="98" y="434">14</text>
            <text x="98" y="458">15</text>
            <text x="98" y="482">16</text>
            <text x="98" y="506">17</text>
            <text x="98" y="530">18</text>
            <text x="98" y="554">19</text>
            <text x="98" y="578">20</text>
            <text x="98" y="602">21</text>
            <text x="98" y="626">22</text>
            <text x="98" y="650">23</text>
            <text x="98" y="674">24</text>
            <text x="98" y="698">25</text>
            <text x="98" y="722">26</text>
            <text x="98" y="746">27</text>
            <text x="98" y="770">28</text>
          </g>

          <g id="hero-text" clip-path="url(#codeAreaClip)">
            <text x="754" y="510" text-anchor="middle"
                  font-family="'Arial Black', 'Helvetica Neue', Arial, Helvetica, sans-serif"
                  font-weight="900"
                  font-size="190"
                  letter-spacing="-4"
                  fill="url(#dots)">Hello World</text>
          </g>

          <rect x="108" y="96" width="1292" height="684" fill="url(#rightEdge)" opacity="0.25"/>
        </g>

        <g id="status-bar">
          <rect x="0" y="780" width="1400" height="20" fill="#0c7cd6"/>
          <text x="14" y="794" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="11" fill="#ffffff">main</text>
          <text x="1386" y="794" text-anchor="end" font-family="-apple-system, 'Segoe UI', Inter, sans-serif" font-size="11" fill="#ffffff">JavaScript · UTF-8</text>
        </g>

      </g>

      <rect x="0" y="0" width="1400" height="800" rx="16" ry="16" fill="none" stroke="#3b3b3f" stroke-width="1.2"/>
    </g>
  </g>
</svg>
